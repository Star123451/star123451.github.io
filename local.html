<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>peg86 - Deluxe</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
    body { background: #0d0d0d; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; color: #ccc; -webkit-user-select: text; user-select: text; }
    html, body { overflow: hidden; position: fixed; width: 100%; height: 100%; touch-action: none; }
    #screen_container { border: 1px solid #333; border-radius: 30px; overflow: hidden; }
    #screen_container canvas { display: block; }
    #status { margin-top: 10px; font-size: 12px; color: #666; }
    #buttons { margin-top: 12px; display: flex; gap: 8px; }
    #keyboard { margin-top: 10px; }
    #text_input { background: #1a1a1a; border: 1px solid #333; color: #ccc; font-family: monospace; font-size: 14px; padding: 6px 10px; border-radius: 4px; width: 300px; outline: none; }
    #ffwd_btn { display: none; position: fixed; bottom: 20px; right: 20px; width: 52px; height: 52px; border-radius: 12px; background: #0d0d0d; border: 1px solid #555; color: #ccc; cursor: pointer; align-items: center; justify-content: center; -webkit-user-select: none; user-select: none; touch-action: none; }
    #ffwd_btn:active { background: #2a2a2a; border-color: #444; }
  </style>
</head>
<body>

  <div id="screen_container">
    <canvas></canvas>
  </div>
  <div id="status">Loading...</div>

  <div id=“gamecontrols”>
    <button id="ffwd_btn" oncontextmenu="return false;">
      <i data-lucide="fast-forward"></i>
    </button>
  </div>
  
  <div id="buttons">
    <a href="?">
      <img src="https://img.shields.io/badge/Peggle%20Deluxe-orange?style=flat"/>
    </a>
    <a href="?nights">
      <img src="https://img.shields.io/badge/Peggle%20Nights-darkblue?style=flat"/>
    </a>
    <a href="?extreme">
      <img src="https://img.shields.io/badge/Peggle%20Extreme-grey?style=flat"/>
    </a>
    <a href="?wow">
      <img src="https://img.shields.io/badge/Peggle%20WoW%20Edition-purple?style=flat"/>
    </a>
    <a href="?proto">
      <img src="https://img.shields.io/badge/Pego%20(Prototype)-blue?style=flat"/>
    </a>
  </div>
  
  <div id="keyboard">
    <input id="text_input" type="text" placeholder="Type here..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
  </div>
  
  <script src="libv86.js"></script>
  <script>
    const STATUS = document.getElementById("status");

    const nights = new URLSearchParams(window.location.search).has("nights");
    const extreme = new URLSearchParams(window.location.search).has("extreme");
    const wow = new URLSearchParams(window.location.search).has("wow");
    const proto = new URLSearchParams(window.location.search).has("proto");
    
    const stateFile = nights ? "nights.bin" : extreme ? "extreme.bin" : wow ? "wow.bin" : proto ? "proto.bin" : "state.bin";
    const stateUrl = `./${stateFile}`;
    
    document.title = nights ? "peg86 - Nights" : extreme ? "peg86 - Extreme" : wow ? "peg86 - WoW Edition" : proto ? "pego86" : "peg86 - Deluxe";

    const emulator = new V86({
      wasm_path:        "v86.wasm",
      memory_size:      512 * 1024 * 1024,   // 512 MB
      vga_memory_size:  8  * 1024 * 1024,    // 8 MB

      screen_container: document.getElementById("screen_container"),

      hda: {
        url:      "./reactos.img",
        async:    true,
        size:     734003200,
      },
      
      net_device: {
        type:       "virtio",
        relay_url:  "",
      },

      autostart: true,
    });
    
    const isTouchDevice =
      window.matchMedia("(pointer: coarse)").matches;

    emulator.add_listener("emulator-ready", async () => {
      STATUS.textContent = "Loading state...";
      try {
        const buf = await fetch(stateUrl).then(r => r.arrayBuffer());
        await emulator.restore_state(buf);
        STATUS.textContent = "Running.";
        if (isTouchDevice) {
          ffwd.style.display = "flex";
        }
      } catch (e) {
        STATUS.textContent = "State load failed: " + e.message;
        console.error(e);
      }
    });
    
    document.getElementById("text_input").addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const text = e.target.value;
        e.target.value = "";
        for (const char of text) {
          emulator.keyboard_send_text(char);
          await new Promise(r => setTimeout(r, 50));
        }
        emulator.keyboard_send_scancodes([0x1c, 0x9c]);
      }
    });
    
    const canvas = document.querySelector("#screen_container canvas");  
    canvas.addEventListener("click", () => canvas.requestPointerLock());
    
    lucide.createIcons();

        const ffwd = document.getElementById("ffwd_btn");

        ffwd.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          emulator.bus.send("mouse-click", [false, false, true]);
        });

        ffwd.addEventListener("pointerup", (e) => {
          e.preventDefault();
          emulator.bus.send("mouse-click", [false, false, false]);
        });

        ffwd.addEventListener("pointerleave", (e) => {
          emulator.bus.send("mouse-click", [false, false, false]);
        });

  </script>
</body>
</html>
